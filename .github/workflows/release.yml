name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      level:
        description: "Release level"
        required: false
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    name: Bump Version & Tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get merged pull request
        uses: actions-ecosystem/action-get-merged-pull-request@v1
        id: get-merged-pr
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get release label
        uses: actions-ecosystem/action-release-label@v1
        id: release-label
        if: ${{ steps.get-merged-pr.outputs.title != '' }}
        with:
          labels: ${{ steps.get-merged-pr.outputs.labels }}

      - name: Get latest tag
        uses: actions-ecosystem/action-get-latest-tag@v1
        id: get-latest-tag
        with:
          semver_only: true
          initial_version: v0.0.0

      - name: Bump semver
        uses: actions-ecosystem/action-bump-semver@v1
        id: bump-semver
        with:
          current_version: ${{ steps.get-latest-tag.outputs.tag }}
          level: ${{ github.event.inputs.level || steps.release-label.outputs.level || 'patch' }}

      - name: Push new tag
        uses: actions-ecosystem/action-push-tag@v1
        with:
          tag: ${{ steps.bump-semver.outputs.new_version }}
          message: ${{ steps.bump-semver.outputs.new_version }}
