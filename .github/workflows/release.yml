name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      level:
        description: "Release level"
        required: false
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    name: Bump Version & Tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Determine release level
        id: level
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ github.event.inputs.level }}" ]; then
            echo "level=${{ github.event.inputs.level }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PR=$(gh pr list --state merged --base main --limit 1 --json labels --jq '.[0].labels[].name')
          for label in $PR; do
            case "$label" in
              release:major) echo "level=major" >> "$GITHUB_OUTPUT"; exit 0 ;;
              release:minor) echo "level=minor" >> "$GITHUB_OUTPUT"; exit 0 ;;
              release:patch) echo "level=patch" >> "$GITHUB_OUTPUT"; exit 0 ;;
            esac
          done

          echo "level=patch" >> "$GITHUB_OUTPUT"

      - name: Get latest tag
        id: latest-tag
        run: |
          TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          echo "tag=${TAG:-v0.0.0}" >> "$GITHUB_OUTPUT"

      - name: Bump version
        id: bump
        run: |
          VERSION="${{ steps.latest-tag.outputs.tag }}"
          VERSION="${VERSION#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          case "${{ steps.level.outputs.level }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          echo "new_version=v${MAJOR}.${MINOR}.${PATCH}" >> "$GITHUB_OUTPUT"

      - name: Push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.bump.outputs.new_version }}" -m "${{ steps.bump.outputs.new_version }}"
          git push origin "${{ steps.bump.outputs.new_version }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.bump.outputs.new_version }}" \
            --generate-notes \
            --title "${{ steps.bump.outputs.new_version }}"
